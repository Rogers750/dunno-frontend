<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="foxGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B4E1A"/>
      <stop offset="45%" stop-color="#D4834A"/>
      <stop offset="100%" stop-color="#F5C98A"/>
    </linearGradient>

    <filter id="amberGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="26" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur1"/>
        <feMergeNode in="blur2"/>
      </feMerge>
    </filter>

    <g id="foxShapes">
      <!-- LEFT EAR — tall and narrow, more foxy -->
      <rect x="148" y="20"  width="46" height="110" rx="22"/>
      <!-- RIGHT EAR — tall and narrow -->
      <rect x="306" y="20"  width="46" height="110" rx="22"/>
      <!-- HEAD — wide but not too tall -->
      <rect x="118" y="100" width="264" height="178" rx="48"/>
      <!-- LEFT CHEEK — smaller, tighter -->
      <rect x="76"  y="138" width="52"  height="88"  rx="24"/>
      <!-- RIGHT CHEEK — smaller, tighter -->
      <rect x="372" y="138" width="52"  height="88"  rx="24"/>
      <!-- SNOUT — narrower, more pointed feel -->
      <rect x="196" y="256" width="108" height="64"  rx="28"/>
      <!-- NOSE tip — small oval -->
      <rect x="226" y="302" width="48"  height="22"  rx="11"/>
    </g>
  </defs>

  <!-- NO background — transparent -->

  <!-- glow layer -->
  <use href="#foxShapes" fill="#F5A84A" stroke="#F5A84A" stroke-width="20" stroke-linejoin="round" stroke-linecap="round" filter="url(#amberGlow)" opacity="0.8"/>

  <!-- sharp gradient layer -->
  <use href="#foxShapes" fill="url(#foxGrad)" stroke="url(#foxGrad)" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
